<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubo 3x3 Minimalista</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000; /* Fundo Preto */
            overflow: hidden;
            perspective: 1200px;
            cursor: grab;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body:active { cursor: grabbing; }

        .scene {
            width: 300px;
            height: 300px;
            transform-style: preserve-3d;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-30deg) rotateY(-45deg);
            transition: transform 0.1s ease-out;
        }

        .face {
            position: absolute;
            width: 300px;
            height: 300px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            background: rgba(255, 255, 255, 0.1); /* Leve transparência interna */
            border: 1px solid rgba(255, 255, 255, 0.5);
            backface-visibility: visible;
        }

        /* Todas as faces brancas */
        .front  { transform: translateZ(150px); }
        .back   { transform: rotateY(180deg) translateZ(150px); }
        .right  { transform: rotateY(90deg) translateZ(150px); }
        .left   { transform: rotateY(-90deg) translateZ(150px); }
        .top    { transform: rotateX(90deg) translateZ(150px); }
        .bottom { transform: rotateX(-90deg) translateZ(150px); }

        /* Estilo dos quadradinhos 3x3 */
        .cell {
            border: 1px solid #000; /* Linha preta para separar os brancos */
            background-color: #fff; /* Cor Branca */
            box-sizing: border-box;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.1); /* Profundidade suave */
        }

        .instructions {
            position: absolute;
            bottom: 30px;
            color: #555;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="scene">
        <div class="cube" id="cube"></div>
    </div>

    <div class="instructions">Arraste para girar • Cubo 3x3</div>

    <script>
        const cube = document.getElementById('cube');
        const faces = ['front', 'back', 'right', 'left', 'top', 'bottom'];
        
        // Gerar as faces e células
        faces.forEach(faceName => {
            const faceDiv = document.createElement('div');
            faceDiv.className = `face ${faceName}`;
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                faceDiv.appendChild(cell);
            }
            cube.appendChild(faceDiv);
        });

        // Lógica de Rotação
        let isDragging = false;
        let lastMouseX, lastMouseY;
        let rotX = -30, rotY = -45;

        const updateRotation = (deltaX, deltaY) => {
            rotY += deltaX * 0.5;
            rotX -= deltaY * 0.5;
            cube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
        };

        // Eventos de Mouse
        document.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            updateRotation(e.clientX - lastMouseX, e.clientY - lastMouseY);
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });

        document.addEventListener('mouseup', () => isDragging = false);

        // Eventos de Toque (Mobile)
        document.addEventListener('touchstart', (e) => {
            isDragging = true;
            lastMouseX = e.touches[0].clientX;
            lastMouseY = e.touches[0].clientY;
        });

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            updateRotation(e.touches[0].clientX - lastMouseX, e.touches[0].clientY - lastMouseY);
            lastMouseX = e.touches[0].clientX;
            lastMouseY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', () => isDragging = false);
    </script>
</body>
</html>
